name: language_helper_example
description: A comprehensive example demonstrating all features of the language_helper plugin.

publish_to: "none"

environment:
  sdk: ^3.9.0
  flutter: ">=3.35.0"

dependencies:
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  http: ^1.1.0
  language_helper:
    path: ../

dependency_overrides:
  language_helper:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0

flutter:
